<!DOCTYPE html>
<html>

<head>
    <title>Global Tech Connect - Event Registration</title>
    <link rel="stylesheet" href="labexam.css">
    <script src="labexam.js"></script>


</head>

<body>

    <h2>Global Tech Connect - Event Registration</h2>

    <div class="form-box">

        <form id="regForm">

            <label>Full Name</label>
            <input type="text" id="name">

            <p id="nameError" class="error"></p>


            <label>Professional Email</label>
            <input type="text" id="email">

            <p id="emailError" class="error"></p>


            <label>Company / Institution (Optional)</label>
            <input type="text" id="company">


            <label>Attendance Type</label>


            <input type="radio" name="type" value="Virtual"> Virtual
            <input type="radio" name="type" value="InPerson"> In-Person

            <p id="typeError" class="error"></p>


            <button type="button" onclick="register()">Register</button>

        </form>

        <br>

        <button onclick="toggleAnalytics()" id="analyticsBtn">
            Show Event Analytics
        </button>

        <div id="analytics" style="display:none">

            <h3>Event Analytics</h3>

            <p>Total Registrants: <span id="total">0</span></p>

            <p>Virtual: <span id="virtual">0</span></p>

            <p>In-Person: <span id="inperson">0</span></p>

        </div>

    </div>

</body>

</html>
